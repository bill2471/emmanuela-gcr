<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rate Your Experience — Emmanuela</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Questrial&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Century Gothic', 'Questrial', 'Futura', -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #ffffff;
      color: #53565A;
    }

    .container {
      text-align: center;
      padding: 2.5rem 2rem;
      max-width: 480px;
      width: 100%;
    }

    .logo-wrapper { margin-bottom: 1.5rem; display: inline-block; }
    .logo { max-width: 200px; height: auto; }
    .divider { width: 50px; height: 1.5px; background: #F0A933; margin: 0 auto 1.75rem; }

    /* === THREE STATES — only one visible at a time === */
    .state { display: none; }
    .state.active { display: block; }

    /* State: loading */
    .state-loading .heading {
      font-size: 20px; font-weight: 400; color: #53565A;
      margin-bottom: 0.5rem; line-height: 1.4; letter-spacing: 0.04em;
    }
    .state-loading .sub {
      font-size: 13px; font-weight: 300; color: #BFBFBF;
      margin-bottom: 1.5rem; line-height: 1.6;
    }
    .spinner-row {
      font-size: 12px; font-weight: 300; color: #BFBFBF;
      letter-spacing: 0.06em; text-transform: uppercase;
    }
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid #ede8df; border-top-color: #F0A933;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* State: success */
    .state-success { animation: fadeIn 0.4s ease; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .check-circle {
      width: 44px; height: 44px; border-radius: 50%; background: #F0A933;
      display: inline-flex; align-items: center; justify-content: center; margin-bottom: 1rem;
    }
    .check-circle svg { width: 22px; height: 22px; stroke: #fff; stroke-width: 2.5; fill: none; }
    .state-success h2 {
      font-size: 20px; font-weight: 400; color: #53565A;
      margin-bottom: 0.4rem; letter-spacing: 0.04em;
    }
    .state-success .ty-text {
      font-size: 13px; font-weight: 300; color: #BFBFBF; line-height: 1.6;
    }
    .redirect-notice {
      margin-top: 1.25rem; font-size: 11px; color: #BFBFBF; letter-spacing: 0.03em;
    }
    .redirect-notice a {
      color: #F0A933; text-decoration: none;
      border-bottom: 1px solid transparent; transition: border-color 0.2s;
    }
    .redirect-notice a:hover { border-bottom-color: #F0A933; }
    .progress-bar {
      width: 100px; height: 2px; background: #ede8df;
      border-radius: 2px; margin: 0.75rem auto 0; overflow: hidden;
    }
    .progress-fill { height: 100%; background: #F0A933; border-radius: 2px; width: 0%; }

    /* State: error */
    .state-error .error-box {
      padding: 1rem 1.25rem; background: #fdf6f6; border: 1px solid #f0dede;
      border-radius: 6px; color: #b44; font-size: 13px; font-weight: 300;
    }

    @media (max-width: 480px) {
      .container { padding: 2rem 1.5rem; }
      .state-loading .heading { font-size: 18px; }
      .logo { max-width: 170px; }
    }
  </style>
</head>

  <script>
    // --- State machine: only one state visible at a time ---
    function showState(id) {
      document.getElementById('stateLoading').classList.remove('active');
      document.getElementById('stateSuccess').classList.remove('active');
      document.getElementById('stateError').classList.remove('active');
      document.getElementById(id).classList.add('active');
    }

    function getParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    var domainMap = {
      // emmanuela-gr (jewelry)
      '120549606': 'https://emmanuela.gr',
      '5714584556': 'https://emmanuela.jewelry',
      '5715736622': 'https://emmanuela-schmuck.de',
      '5715134428': 'https://emmanuela.co.uk',
      // emmanuela-shoes (sandals)
      '486972097': 'https://emmanuela.shoes'
    };

    var merchantId = getParam('merchant_id') || '5714046757';
    var orderId = getParam('order_id');
    var email = getParam('email');
    var deliveryCountry = getParam('delivery_country');
    var estimatedDeliveryDate = getParam('estimated_delivery_date');

    var returnUrl = domainMap[merchantId] || 'https://emmanuela.gr';

    // Check params immediately
    var hasMissingParams = !orderId || !email || !deliveryCountry || !estimatedDeliveryDate;
    if (hasMissingParams) {
      document.getElementById('errorText').textContent =
        'Missing order information. Please close this tab and try again.';
      showState('stateError');
    }

    // Auto-close tab (or show fallback message)
    function startRedirect() {
      var seconds = 3;
      var countdownEl = document.getElementById('countdown');
      var progressEl = document.getElementById('progressBar');
      var noticeEl = document.getElementById('closeNotice');
      progressEl.style.transition = 'width ' + seconds + 's linear';
      requestAnimationFrame(function() { progressEl.style.width = '100%'; });
      var timer = setInterval(function() {
        seconds--;
        if (countdownEl) countdownEl.textContent = seconds;
        if (seconds <= 0) {
          clearInterval(timer);
          // Try to close this tab (works when opened via link)
          window.close();
          // If still open after 500ms, show fallback message
          setTimeout(function() {
            if (noticeEl) {
              noticeEl.textContent = 'You can close this tab and return to your order.';
            }
          }, 500);
        }
      }, 1000);
    }
  </script>

  <script src="https://apis.google.com/js/platform.js?onload=renderOptIn" async defer></script>
  <script>
    window.renderOptIn = function() {
      if (hasMissingParams) return;
      try {
        window.gapi.load('surveyoptin', function() {
          window.gapi.surveyoptin.render({
            merchant_id: parseInt(merchantId) || 5714046757,
            order_id: orderId,
            email: email,
            delivery_country: deliveryCountry,
            estimated_delivery_date: estimatedDeliveryDate,
            opt_in_style: 'CENTER_DIALOG'
          });
          setTimeout(function() {
            showState('stateSuccess');
            startRedirect();
          }, 2000);
        });
      } catch (e) {
        showState('stateError');
        console.error('Google Survey Opt-in error:', e);
      }
    };

    // Fallback: if Google script fails to load in 10s
    setTimeout(function() {
      if (!hasMissingParams && typeof window.gapi === 'undefined') {
        showState('stateError');
      }
    }, 10000);
  </script>
